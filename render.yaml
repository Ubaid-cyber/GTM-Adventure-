services:
  # ─── BACKEND SERVICE ────────────────────────────────────────────────────────
  - type: web
    name: gtm-adventure-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate --schema=../prisma/schema.prisma && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromService:
          name: gtm-adventure-db
          type: db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false # Typically the frontend URL
      - key: CRON_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ─── FRONTEND SERVICE ───────────────────────────────────────────────────────
  - type: web
    name: gtm-adventure-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npx prisma generate --schema=../prisma/schema.prisma && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          name: gtm-adventure-db
          type: db
          property: connectionString
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_API_URL
        sync: false # Should point to Backend's Render URL
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
