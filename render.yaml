services:
  - type: web
    name: gtm-adventure-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate --schema=../prisma/schema.prisma && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
